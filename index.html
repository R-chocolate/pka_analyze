<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>PKA 答案分析器</title>
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --dark: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f4f7f9;
            color: #333;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        #btnAnalyze {
            background: var(--primary);
            color: white;
        }

        #btnDownload {
            background: var(--success);
            color: white;
            display: none;
        }

        button:hover {
            opacity: 0.9;
        }

        #result {
            white-space: pre-wrap;
            background: var(--dark);
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
            min-height: 100px;
            border: 1px solid #333;
        }

        .loading {
            color: var(--primary);
            font-weight: bold;
            display: none;
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1>Cisco PKA 提取器</h1>
        <div class="controls">
            <input type="file" id="fileInput">
            <button id="btnAnalyze" onclick="startAnalyze()">分析檔案</button>
            <button id="btnDownload" onclick="downloadTxt()">下載配置 (answer.txt)</button>
        </div>
        <div id="loader" class="loading">正在聯繫雲端 AI 分析中...</div>
        <div id="result">尚未進行分析</div>
    </div>

    <script>
        let lastResult = "";

        async function startAnalyze() {
            const fileEl = document.getElementById('fileInput');
            const resEl = document.getElementById('result');
            const loadEl = document.getElementById('loader');
            const dlBtn = document.getElementById('btnDownload');

            if (!fileEl.files[0]) return alert("請先選擇 PKA 檔案！");

            const formData = new FormData();
            formData.append('file', fileEl.files[0]);

            loadEl.style.display = "block";
            dlBtn.style.display = "none";
            resEl.innerText = "";
            resEl.style.color = "#d4d4d4";

            try {
                // Cloud Run Service URL
                const GCP_URL = 'https://pka-analyze-653034698950.asia-east1.run.app/upload';

                const response = await fetch(GCP_URL, {
                    method: 'POST',
                    body: formData
                });
                const json = await response.json();

                if (json.status === "success") {
                    lastResult = json.data;
                    resEl.innerText = lastResult;
                    dlBtn.style.display = "inline-block";
                } else {
                    resEl.innerText = "錯誤: " + json.message;
                    resEl.style.color = "#ff6b6b";
                }
            } catch (err) {
                resEl.innerText = "連線後端失敗: " + err;
                resEl.style.color = "#ff6b6b";
            } finally {
                loadEl.style.display = "none";
            }
        }

        function downloadTxt() {
            if (!lastResult) return;
            const blob = new Blob([lastResult], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'answer.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>

</html>
